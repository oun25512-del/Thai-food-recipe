
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Sarabun:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FDF8F0;--surface:#FFF9F0;--card:#FFFCF7;--text:#2C1A0E;--muted:#7A5C3E;--accent:#C85A1A;--accent2:#E8A030;--green:#4A7C45;--border:#E8D8C0;--tag-bg:#FFF0DD;--tag-text:#9B4A10;--custom:#3A6EA5;--custom-bg:#EBF3FC}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
.hero{background:linear-gradient(135deg,#3D1C08 0%,#7A3510 60%,#C85A1A 100%);padding:2.5rem 1.5rem 3rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='8'/%3E%3C/g%3E%3C/svg%3E")}
.hero-emoji{font-size:2.8rem;margin-bottom:0.4rem;display:block;position:relative}
.hero h1{font-size:2.2rem;color:#FFF8F0;font-weight:700;line-height:1.2;margin-bottom:0.4rem;position:relative}
.hero p{color:#F4C070;font-size:0.95rem;font-weight:300;letter-spacing:0.05em;position:relative}
.search-wrap{margin:1.2rem auto 0;max-width:380px;display:flex;gap:8px;position:relative}
.search-wrap input{flex:1;padding:11px 16px;border-radius:24px;border:none;font-family:'Sarabun',sans-serif;font-size:14px;background:rgba(255,255,255,0.96);color:var(--text);outline:none}
.search-wrap button{padding:11px 20px;border-radius:24px;border:none;background:var(--accent2);color:#fff;font-family:'Sarabun',sans-serif;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-cats{display:flex;gap:8px;padding:0.9rem 1.2rem;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none}
.nav-cats::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.cat-btn.active,.cat-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem 0}
.section-title{font-size:1.2rem;color:var(--text);display:flex;align-items:center;gap:8px}
.count-badge{font-size:12px;background:var(--tag-bg);color:var(--tag-text);padding:2px 10px;border-radius:12px;font-weight:500}
.btn-add{padding:8px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-family:'Sarabun',sans-serif;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.2s}
.btn-add:hover{background:#a84a14}
.btn-mymenus{padding:8px 14px;border-radius:20px;border:1.5px solid var(--custom);background:var(--custom-bg);color:var(--custom);font-family:'Sarabun',sans-serif;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.btn-mymenus:hover{background:var(--custom);color:#fff}
.top-actions{display:flex;gap:8px}
.section{padding:1rem 1.2rem 1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px}
.card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(200,90,26,0.15)}
.card.custom-card{border-color:#B8D4EE}
.custom-badge{position:absolute;top:8px;right:8px;background:var(--custom);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.card-img{width:100%;height:100px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;background:linear-gradient(135deg,#FFF0DD,#FFE4C0)}
.card.custom-card .card-img{background:linear-gradient(135deg,#EBF3FC,#D2E8F8)}
.card-body{padding:10px}
.card-name{font-family:'Playfair Display',serif;font-size:0.88rem;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.3}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--tag-bg);color:var(--tag-text);font-weight:500}
.tag.green{background:#EDF5EC;color:#2E6B29}
.tag.blue{background:var(--custom-bg);color:var(--custom)}
.card-time{font-size:11px;color:var(--muted)}
.empty-msg{color:var(--muted);font-size:14px;grid-column:1/-1;padding:2rem 0;text-align:center;line-height:2}

/* ===== MODALS ===== */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(44,26,14,0.65);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:1.5rem 1.4rem 2rem}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-header h3{font-size:1.2rem;color:var(--text)}
.close-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:none;font-size:18px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.9rem}
.info-row{display:flex;gap:10px;margin-bottom:1.2rem}
.info-box{flex:1;background:var(--surface);border-radius:12px;padding:9px;text-align:center;border:1px solid var(--border)}
.info-box .val{font-size:0.95rem;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}
.info-box .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.section-sub{font-size:1rem;font-weight:600;color:var(--text);margin:1rem 0 0.5rem;font-family:'Playfair Display',serif}
.ingredient-list{list-style:none}
.ingredient-list li{padding:6px 0;border-bottom:1px solid var(--border);font-size:13.5px;display:flex;gap:8px;align-items:baseline}
.ingredient-list li span.amt{color:var(--accent);font-weight:600;min-width:80px;flex-shrink:0}
.step-list{list-style:none}
.step-list li{padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.step-num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px}
.tip-box{background:#FFFBEE;border:1px solid #F4D870;border-radius:12px;padding:12px 14px;font-size:13px;color:#7A6010;margin-top:1.1rem;line-height:1.6}
.tip-box strong{color:#5A4A00;display:block;margin-bottom:2px}
.delete-btn{margin-top:1rem;width:100%;padding:10px;border-radius:12px;border:1.5px solid #E0C0B0;background:none;color:#A05040;font-family:'Sarabun',sans-serif;font-size:14px;cursor:pointer;font-weight:500}
.delete-btn:hover{background:#FFF0EC;border-color:#C05030}

/* ===== ADD FORM ===== */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:70px}
.emoji-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.emoji-opt{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.15s}
.emoji-opt.selected,.emoji-opt:hover{border-color:var(--accent);background:var(--tag-bg)}
.ing-list-form{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.ing-row{display:flex;gap:8px;align-items:center}
.ing-row input{flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-family:'Sarabun',sans-serif;font-size:13px;color:var(--text);background:var(--surface)}
.ing-row input:focus{border-color:var(--accent);outline:none}
.ing-row .inp-amt{width:90px;flex:none}
.btn-add-ing{padding:8px 12px;border-radius:8px;border:1.5px dashed var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;width:100%;transition:all 0.15s}
.btn-add-ing:hover{border-color:var(--accent);color:var(--accent)}
.remove-ing{width:26px;height:26px;border-radius:50%;border:none;background:#FEE8E0;color:#A05040;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.remove-ing:hover{background:#F0C0B0}
.btn-submit{width:100%;padding:12px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-family:'Sarabun',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:0.5rem;transition:background 0.2s}
.btn-submit:hover{background:#a84a14}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* My menus modal */
.my-ing-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:10px}
.my-ing-card h4{font-size:0.95rem;margin-bottom:8px;color:var(--text);display:flex;align-items:center;gap:8px}
.ing-chips{display:flex;flex-wrap:wrap;gap:6px}
.ing-chip{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--tag-bg);color:var(--tag-text);border:1px solid #F0D8B8}
.ing-chip .amt-part{color:var(--accent);font-weight:600;margin-right:3px}
.no-custom{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:14px;line-height:2}
</style>

<div class="hero">
  <span class="hero-emoji">🍜</span>
  <h1>ครัวไทยแท้</h1>
  <p>เมนูอาหารและสูตรอาหารไทย • รสชาติต้นตำรับ</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="ค้นหาเมนู เช่น ผัดไทย, แกง...">
    <button id="searchBtn">🔍 ค้นหา</button>
  </div>
</div>

<div class="nav-cats">
  <button class="cat-btn active" data-cat="ทั้งหมด">ทั้งหมด</button>
  <button class="cat-btn" data-cat="กับข้าว">🥘 กับข้าว</button>
  <button class="cat-btn" data-cat="ก๋วยเตี๋ยว">🍜 ก๋วยเตี๋ยว</button>
  <button class="cat-btn" data-cat="ยำ-ลาบ">🥗 ยำ-ลาบ</button>
  <button class="cat-btn" data-cat="ของหวาน">🍡 ของหวาน</button>
  <button class="cat-btn" data-cat="ต้ม-แกง">🍲 ต้ม-แกง</button>
  <button class="cat-btn" data-cat="ทอด-ย่าง">🍗 ทอด-ย่าง</button>
  <button class="cat-btn" data-cat="น้ำพริก">🌶 น้ำพริก</button>
  <button class="cat-btn" data-cat="เมนูของฉัน">⭐ ของฉัน</button>
</div>

<div class="toolbar">

  <div class="top-actions">

</div>
<div class="section">
  <div class="grid" id="recipeGrid"></div>
</div>

<!-- Recipe Detail Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div id="modalTitle" style="flex:1"></div>
      <button class="close-btn" id="closeDetail">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Add Menu Modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h3>＋ เพิ่มเมนูของคุณ</h3>

        <div class="emoji-opt" data-e="🥗">🥗</div>
        <div class="emoji-opt" data-e="🍛">🍛</div>
        <div class="emoji-opt" data-e="🍚">🍚</div>
        <div class="emoji-opt" data-e="🍗">🍗</div>
        <div class="emoji-opt" data-e="🥩">🥩</div>
        <div class="emoji-opt" data-e="🍡">🍡</div>
        <div class="emoji-opt" data-e="🌶">🌶</div>

        <div class="emoji-opt" data-e="🫓">🫓</div>

    <div class="form-row">
      <div class="form-group">

    <div class="form-row">

        <select id="fSpicy"><option value="0">ไม่เผ็ด</option><option value="1">เผ็ดน้อย</option><option value="2">เผ็ดกลาง</option><option value="3">เผ็ดมาก</option></select>

    <div class="form-group">
      <label>วัตถุดิบ * <small style="color:var(--muted);font-weight:400">(ปริมาณ + ชื่อวัตถุดิบ)</small></label>

    <div class="form-group">

      <textarea id="fSteps" placeholder="1. ตั้งกระทะ...&#10;2. ใส่วัตถุดิบ...&#10;3. ปรุงรส..."></textarea>
    </div>

    <div class="form-group">
      <label>เคล็ดลับ (ไม่บังคับ)</label>
      <input type="text" id="fTip" placeholder="เช่น ใช้ไฟแรงจะหอมกว่า">

<!-- My Ingredients Modal -->
<div class="modal-bg" id="myModal">

    <div class="modal-header">
      <h3>📋 วัตถุดิบเมนูของฉัน</h3>
      <button class="close-btn" id="closeMyModal">✕</button>
    </div>
    <div id="myIngBody"></div>
  </div>
</div>

<script>
const presetRecipes = [
  {name:"ผัดไทย",emoji:"🍜",cat:"ก๋วยเตี๋ยว",time:"20 นาที",level:"ง่าย",spicy:1,custom:false,
   ingredients:[{amt:"200 ก.",item:"เส้นจันทน์แช่น้ำ"},{amt:"150 ก.",item:"กุ้งสด"},{amt:"2 ฟอง",item:"ไข่ไก่"},{amt:"100 ก.",item:"เต้าหู้แข็ง"},{amt:"3 ช้อนโต๊ะ",item:"น้ำตาลปี๊บ"},{amt:"3 ช้อนโต๊ะ",item:"น้ำมะขามเปียก"},{amt:"2 ช้อนโต๊ะ",item:"น้ำปลา"},{amt:"ตามชอบ",item:"ถั่วงอก ต้นหอม มะนาว"}],
   steps:["ตั้งกระทะใส่น้ำมัน ผัดกระเทียมและเต้าหู้จนเหลืองหอม","ใส่กุ้ง ผัดจนสุก แล้วดันออกด้านข้างกระทะ","ใส่เส้นจันทน์ ผัดให้เส้นนิ่ม ปรุงด้วยน้ำตาลปี๊บ มะขาม น้ำปลา","ดันเส้นออกข้าง ตีไข่ใส่กลางกระทะ คลุกเคล้าให้เข้ากัน","ใส่ถั่วงอก ต้นหอม ผัดต่อ 1 นาที จัดจาน บีบมะนาว"],
   tip:"ใช้ไฟแรงจะได้กลิ่นหอม และเส้นไม่เละ"},
  {name:"ต้มยำกุ้ง",emoji:"🍲",cat:"ต้ม-แกง",time:"25 นาที",level:"ปานกลาง",spicy:3,custom:false,
   ingredients:[{amt:"300 ก.",item:"กุ้งสด"},{amt:"1 ลิตร",item:"น้ำซุป"},{amt:"3 ก้าน",item:"ตะไคร้ทุบ"},{amt:"5 ใบ",item:"ใบมะกรูด"},{amt:"3 แว่น",item:"ข่าแก่"},{amt:"5-7 เม็ด",item:"พริกขี้หนูสด"},{amt:"3 ช้อนโต๊ะ",item:"น้ำปลา"},{amt:"2 ช้อนโต๊ะ",item:"น้ำมะนาว"},{amt:"1 ช้อนโต๊ะ",item:"น้ำพริกเผา"}],
   steps:["ต้มน้ำซุปให้เดือด ใส่ตะไคร้ทุบ ข่า ใบมะกรูด","ใส่เห็ดฟาง ต้มให้สุก","ใส่กุ้ง พอสุกใส่น้ำพริกเผา","ปรุงรสด้วยน้ำปลา น้ำมะนาว","ใส่พริกขี้หนู ตักเสิร์ฟร้อนๆ โรยผักชี"],
   tip:"บีบมะนาวหลังยกลงจากเตา รสจะไม่ขม"},
  {name:"แกงเขียวหวาน",emoji:"🥘",cat:"กับข้าว",time:"35 นาที",level:"ปานกลาง",spicy:2,custom:false,

let customRecipes = [];
try {
  var stored = window.storage ? null : null;
} catch(e){}

// Load from storage
async function loadCustom() {
  try {
    const r = await window.storage.get('custom_recipes');
    if (r && r.value) customRecipes = JSON.parse(r.value);
  } catch(e){ customRecipes = []; }
  renderGrid(allRecipes());
}

async function saveCustom() {
  try { await window.storage.set('custom_recipes', JSON.stringify(customRecipes)); } catch(e){}
}

function allRecipes() { return presetRecipes.concat(customRecipes); }

let currentCat = 'ทั้งหมด';

function getSpicy(n){ return n===0?'ไม่เผ็ด':n===1?'🌶 น้อย':n===2?'🌶🌶 กลาง':'🌶🌶🌶 มาก' }

function renderGrid(list) {
  const grid = document.getElementById('recipeGrid');
  document.getElementById('countBadge').textContent = list.length + ' เมนู';
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<p class="empty-msg">🍽️ ไม่พบเมนู<br><small>ลองเพิ่มเมนูของคุณเอง!</small></p>';
    return;
  }
  list.forEach(function(r) {
    var d = document.createElement('div');
    d.className = 'card' + (r.custom ? ' custom-card' : '');
    var lvlCls = r.level === 'ง่าย' ? 'green' : '';
    d.innerHTML = (r.custom ? '<div class="custom-badge">ของฉัน</div>' : '') +
      '<div class="card-img">' + r.emoji + '</div>' +
      '<div class="card-body"><div class="card-name">' + r.name + '</div>' +
      '<div class="card-meta"><span class="tag ' + lvlCls + '">' + r.level + '</span>' +
      '<span class="card-time">⏱ ' + r.time + '</span></div></div>';
    d.addEventListener('click', function(){ openDetail(r); });
    grid.appendChild(d);
  });
}

function applyFilter() {
  var all = allRecipes();
  var list = all;
  if (currentCat === 'เมนูของฉัน') list = customRecipes;
  else if (currentCat !== 'ทั้งหมด') list = all.filter(function(r){ return r.cat === currentCat; });
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) list = list.filter(function(r){ return r.name.toLowerCase().indexOf(q) >= 0 || r.cat.toLowerCase().indexOf(q) >= 0; });
  renderGrid(list);
}

document.getElementById('searchBtn').addEventListener('click', applyFilter);
document.getElementById('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') applyFilter(); });
document.querySelectorAll('.cat-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentCat = btn.getAttribute('data-cat');
    applyFilter();
  });
});

// Detail modal
function openDetail(r) {
  var ings = r.ingredients.map(function(i){ return '<li><span class="amt">'+(i.amt||'')+'</span>'+i.item+'</li>'; }).join('');
  var steps = r.steps.map(function(s,i){ return '<li><div class="step-num">'+(i+1)+'</div><span>'+s+'</span></li>'; }).join('');
  document.getElementById('modalTitle').innerHTML =
    '<span style="font-size:2.5rem;display:block;text-align:center;margin-bottom:4px">'+r.emoji+'</span><h2>'+r.name+'</h2>';
  var deleteBtn = r.custom ? '<button class="delete-btn" id="deleteBtn">🗑 ลบเมนูนี้</button>' : '';
  document.getElementById('modalBody').innerHTML =
    '<div class="info-row">' +
    '<div class="info-box"><div class="val">⏱ '+r.time+'</div><div class="lbl">เวลาทำ</div></div>' +
    '<div class="info-box"><div class="val">'+r.level+'</div><div class="lbl">ระดับ</div></div>' +
    '<div class="info-box"><div class="val" style="font-size:0.82rem">'+getSpicy(r.spicy)+'</div><div class="lbl">ความเผ็ด</div></div>' +
    '</div>' +
    '<div class="section-sub">🧺 วัตถุดิบ</div>' +
    '<ul class="ingredient-list">'+ings+'</ul>' +
    '<div class="section-sub">👨‍🍳 วิธีทำ</div>' +
    '<ul class="step-list">'+steps+'</ul>' +
    (r.tip ? '<div class="tip-box"><strong>💡 เคล็ดลับ</strong>'+r.tip+'</div>' : '') +
    deleteBtn;
  if (r.custom) {
    document.getElementById('deleteBtn').addEventListener('click', function(){
      customRecipes = customRecipes.filter(function(x){ return x !== r; });
      saveCustom();
      closeModal('detailModal');
      applyFilter();
    });
  }
  document.getElementById('detailModal').classList.add('open');
}
document.getElementById('closeDetail').addEventListener('click', function(){ closeModal('detailModal'); });
document.getElementById('detailModal').addEventListener('click', function(e){ if(e.target===this) closeModal('detailModal'); });

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function addIngRow(amt, item) {
  var row = document.createElement('div');
  row.className = 'ing-row';
  row.innerHTML = '<input class="inp-amt" type="text" placeholder="ปริมาณ" value="'+(amt||'')+'">'+
    '<input type="text" placeholder="ชื่อวัตถุดิบ" value="'+(item||'')+'">'+
    '<button class="remove-ing">✕</button>';
  row.querySelector('.remove-ing').addEventListener('click', function(){ row.remove(); });
  document.getElementById('ingList').appendChild(row);
}

document.getElementById('btnAddMenu').addEventListener('click', function(){
  document.getElementById('fName').value = '';

  document.getElementById('fTip').value = '';
  document.getElementById('fSteps').value = '';
  document.getElementById('ingList').innerHTML = '';
  addIngRow('',''); addIngRow('',''); addIngRow('','');
  document.getElementById('addModal').classList.add('open');
});

document.getElementById('addModal').addEventListener('click', function(e){ if(e.target===this) closeModal('addModal'); });

document.getElementById('submitMenu').addEventListener('click', function(){
  var name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').style.borderColor='#C85A1A'; document.getElementById('fName').focus(); return; }
  document.getElementById('fName').style.borderColor='';
  var rows = document.querySelectorAll('#ingList .ing-row');
  var ings = [];
  rows.forEach(function(row){
    var inputs = row.querySelectorAll('input');
    var amt = inputs[0].value.trim();
    var item = inputs[1].value.trim();
    if (item) ings.push({amt:amt, item:item});
  });
  if (!ings.length) { alert('กรุณาใส่วัตถุดิบอย่างน้อย 1 รายการ'); return; }
  var stepsRaw = document.getElementById('fSteps').value.trim();
  var steps = stepsRaw ? stepsRaw.split('\n').map(function(s){ return s.replace(/^\d+\.\s*/,'').trim(); }).filter(Boolean) : ['(ไม่ได้ระบุวิธีทำ)'];
  var newR = {
    name: name,
    emoji: selectedEmoji,
    cat: document.getElementById('fCat').value,
    time: document.getElementById('fTime').value.trim() || 'ไม่ระบุ',
    level: document.getElementById('fLevel').value,
    spicy: parseInt(document.getElementById('fSpicy').value),
    ingredients: ings,
    steps: steps,
    tip: document.getElementById('fTip').value.trim(),
    custom: true
  };
  customRecipes.push(newR);
  saveCustom();
  closeModal('addModal');
  applyFilter();
});

  var body = document.getElementById('myIngBody');
  if (!customRecipes.length) {
    body.innerHTML = '<div class="no-custom">🍽️ คุณยังไม่มีเมนูของตัวเอง<br><small>กด <strong>＋ เพิ่มเมนู</strong> เพื่อเริ่มต้น</small></div>';
  } else {
    body.innerHTML = customRecipes.map(function(r){
      var chips = r.ingredients.map(function(i){
        return '<span class="ing-chip"><span class="amt-part">'+(i.amt||'')+'</span>'+i.item+'</span>';
      }).join('');
      return '<div class="my-ing-card"><h4>'+r.emoji+' '+r.name+'</h4><div class="ing-chips">'+chips+'</div></div>';
    }).join('');
  }
  document.getElementById('myModal').classList.add('open');
});
